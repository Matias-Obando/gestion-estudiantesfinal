<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Estudiantes</title>
    <style>
        body {
            background-color: #934993;
            font-family: Arial;
            color: white;
        }
        h2 { margin-top: 30px; }
        label { display: block; margin-top: 10px; }
    </style>
</head>

<body>

<h2> Consulta </h2>

<form action="consulta" method="get">
    Sentencia SQL: <input type="text" name="sql">
    <input type="submit" value="Ejecutar consulta">
</form>

<h2>Alta alumno</h2>

<form action="consulta" method="post">
    <label>ID: <input type="number" name="id"></label>
    <label>Curso: <input type="text" name="curso"></label>
    <label>Nombre: <input type="text" name="nombre"></label>

    <input type="submit" value="Alta alumno">
</form>

</body>
</html>
